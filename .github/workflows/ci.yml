name: E00 foundation CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e00-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Specs, quality, tests, build, and smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      CI: "true"
      FEATURE_LIVE_PROVIDER_TESTS: "false"
      NODE_ENV: test
      TEST_DATABASE_URL: postgresql://serialos:serialos-test-only@127.0.0.1:55432/serialos_test
      TEST_S3_ACCESS_KEY_ID: minio-test
      TEST_S3_BUCKET: serialos-test
      TEST_S3_ENDPOINT: http://127.0.0.1:59000
      TEST_S3_SECRET_ACCESS_KEY: serialos-minio-test-only
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install pinned pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Install pinned Node.js and restore pnpm cache
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Install specification validator dependencies
        run: python -m pip install --disable-pip-version-check -r scripts/requirements.txt

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Start isolated PostgreSQL and object storage
        run: pnpm infra:test:up

      - name: Prepare test database
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
        run: |
          pnpm db:migrate
          pnpm db:seed

      - name: Validate specifications and CI declaration
        run: |
          pnpm specs:validate
          pnpm ci:verify-workflow
          pnpm command:check

      - name: Check formatting, lint, types, and dependency boundaries
        run: |
          pnpm format:check
          pnpm lint
          pnpm typecheck
          pnpm dependency:check

      - name: Run deterministic test suites
        run: |
          pnpm test
          pnpm test:offline
          pnpm contracts:check
          pnpm test:integration
          pnpm test:live

      - name: Prove negative gates reject isolated mutations
        run: pnpm ci:prove-failures

      - name: Build production artifacts
        run: pnpm build

      - name: Run browser and production smoke tests
        run: |
          pnpm test:e2e
          pnpm smoke

      - name: Stop isolated dependencies
        if: always()
        run: pnpm infra:test:down
