openapi: 3.1.0
info:
  title: SerialOS API
  version: 1.0.0
  description: 'MVP API contract for SerialOS. Session authentication and workspace scoping

    are mandatory. The server returns 404 for resources outside the active workspace.

    '
servers:
- url: /api/v1
security:
- sessionCookie: []
tags:
- name: Audit
- name: Usage
- name: Claims
- name: Onboarding
- name: Auth
- name: Workspace
- name: Creator Profile
- name: Columns
- name: Materials
- name: Assets
- name: Topics
- name: Content Runs
- name: Review
- name: Artifacts
- name: Exports
- name: Publishing
- name: Jobs
- name: Operations
paths:
  /workspace:
    get:
      tags:
      - Workspace
      operationId: getWorkspace
      responses:
        '200':
          description: Current workspace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceResponse'
        default:
          $ref: '#/components/responses/Error'
    patch:
      tags:
      - Workspace
      operationId: updateWorkspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceUpdate'
      responses:
        '200':
          description: Updated workspace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceResponse'
        '409':
          $ref: '#/components/responses/Conflict'
        default:
          $ref: '#/components/responses/Error'
  /workspace/deletion:
    post:
      tags:
      - Workspace
      operationId: requestWorkspaceDeletion
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
              - workspaceName
              - reauthenticationToken
              properties:
                workspaceName:
                  type: string
                reauthenticationToken:
                  type: string
      responses:
        '202':
          $ref: '#/components/responses/AcceptedJob'
        default:
          $ref: '#/components/responses/Error'
    get:
      tags:
      - Workspace
      operationId: getWorkspaceDeletion
      responses:
        '200':
          description: Deletion status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResponse'
        default:
          $ref: '#/components/responses/Error'
  /creator-profile:
    get:
      tags:
      - Creator Profile
      operationId: getCreatorProfile
      responses:
        '200':
          description: Active and draft profile
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    $ref: ../schemas/creator-profile.schema.json
        default:
          $ref: '#/components/responses/Error'
    patch:
      tags:
      - Creator Profile
      operationId: updateCreatorProfileDraft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
              - version
              - patch
              properties:
                version:
                  type: integer
                  minimum: 1
                patch:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Profile draft
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: ../schemas/creator-profile.schema.json
        '409':
          $ref: '#/components/responses/Conflict'
        default:
          $ref: '#/components/responses/Error'
  /creator-profile/suggestions:
    post:
      tags:
      - Creator Profile
      operationId: requestProfileSuggestions
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          $ref: '#/components/responses/AcceptedJob'
        default:
          $ref: '#/components/responses/Error'
  /creator-profile/activate:
    post:
      tags:
      - Creator Profile
      operationId: activateCreatorProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
              - profileVersion
              properties:
                profileVersion:
                  type: integer
                  minimum: 1
      responses:
        '200':
          description: Activated profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: ../schemas/creator-profile.schema.json
        default:
          $ref: '#/components/responses/Error'
  /columns:
    get:
      tags:
      - Columns
      operationId: listColumns
      parameters:
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Columns
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ColumnListResponse'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags:
      - Columns
      operationId: createColumn
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ColumnCreate'
      responses:
        '201':
          description: Created column
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ColumnResponse'
        default:
          $ref: '#/components/responses/Error'
  /columns/{columnId}:
    parameters:
    - $ref: '#/components/parameters/ColumnId'
    get:
      tags:
      - Columns
      operationId: getColumn
      responses:
        '200':
          description: Column
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ColumnResponse'
        default:
          $ref: '#/components/responses/Error'
    patch:
      tags:
      - Columns
      operationId: updateColumn
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - version
              - patch
              properties:
                version:
                  type: integer
                patch:
                  $ref: '#/components/schemas/ColumnCreate'
      responses:
        '200':
          description: Updated column
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ColumnResponse'
        '409':
          $ref: '#/components/responses/Conflict'
        default:
          $ref: '#/components/responses/Error'
  /materials/text:
    post:
      tags:
      - Materials
      operationId: createTextMaterial
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
              - text
              - privacyLevel
              - isPersonalExperience
              properties:
                title:
                  type: string
                  maxLength: 200
                text:
                  type: string
                  minLength: 1
                  maxLength: 100000
                privacyLevel:
                  $ref: '#/components/schemas/PrivacyLevel'
                isPersonalExperience:
                  type: boolean
                tags:
                  type: array
                  maxItems: 30
                  items:
                    type: string
      responses:
        '202':
          description: Material created and processing queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaterialJobResponse'
        default:
          $ref: '#/components/responses/Error'
  /materials/url:
    post:
      tags:
      - Materials
      operationId: createUrlMaterial
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
              - url
              - privacyLevel
              properties:
                url:
                  type: string
                  format: uri
                title:
                  type: string
                  maxLength: 200
                privacyLevel:
                  $ref: '#/components/schemas/PrivacyLevel'
                tags:
                  type: array
                  items:
                    type: string
      responses:
        '202':
          $ref: '#/components/responses/AcceptedJob'
        default:
          $ref: '#/components/responses/Error'
  /materials/uploads:
    post:
      tags:
      - Materials
      operationId: createUploadSession
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadCreate'
      responses:
        '201':
          description: Signed upload session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadSessionResponse'
        default:
          $ref: '#/components/responses/Error'
  /materials/{materialId}/complete-upload:
    post:
      tags:
      - Materials
      operationId: completeMaterialUpload
      parameters:
      - $ref: '#/components/parameters/MaterialId'
      - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          $ref: '#/components/responses/AcceptedJob'
        default:
          $ref: '#/components/responses/Error'
  /materials:
    get:
      tags:
      - Materials
      operationId: listMaterials
      parameters:
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Cursor'
      - name: status
        in: query
        schema:
          type: string
      - name: type
        in: query
        schema:
          type: string
      - name: q
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Materials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaterialListResponse'
        default:
          $ref: '#/components/responses/Error'
  /materials/{materialId}:
    parameters:
    - $ref: '#/components/parameters/MaterialId'
    get:
      tags:
      - Materials
      operationId: getMaterial
      responses:
        '200':
          description: Material
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    $ref: ../schemas/material-item.schema.json
        default:
          $ref: '#/components/responses/Error'
    patch:
      tags:
      - Materials
      operationId: updateMaterial
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - version
              - patch
              properties:
                version:
                  type: integer
                patch:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Updated material
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: ../schemas/material-item.schema.json
        '409':
          $ref: '#/components/responses/Conflict'
        default:
          $ref: '#/components/responses/Error'
    delete:
      tags:
      - Materials
      operationId: deleteMaterial
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
              - mode
              - version
              properties:
                mode:
                  enum:
                  - delete_file_keep_confirmed_summary
                  - delete_with_derivatives
                version:
                  type: integer
      responses:
        '202':
          $ref: '#/components/responses/AcceptedJob'
        default:
          $ref: '#/components/responses/Error'
  /materials/{materialId}/reprocess:
    post:
      tags:
      - Materials
      operationId: reprocessMaterial
      parameters:
      - $ref: '#/components/parameters/MaterialId'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                materialVersionId:
                  type: string
                  format: uuid
                fromStep:
                  type: string
      responses:
        '202':
          $ref: '#/components/responses/AcceptedJob'
        default:
          $ref: '#/components/responses/Error'
  /assets:
    get:
      tags:
      - Assets
      operationId: listInsightAssets
      parameters:
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Cursor'
      - name: q
        in: query
        schema:
          type: string
      - name: type
        in: query
        schema:
          type: string
      - name: confirmation
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Insight assets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetListResponse'
        default:
          $ref: '#/components/responses/Error'
  /assets/{assetId}:
    parameters:
    - $ref: '#/components/parameters/AssetId'
    get:
      tags:
      - Assets
      operationId: getInsightAsset
      responses:
        '200':
          description: Insight asset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetResponse'
        default:
          $ref: '#/components/responses/Error'
    patch:
      tags:
      - Assets
      operationId: updateInsightAsset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - version
              - patch
              properties:
                version:
                  type: integer
                patch:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Updated asset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetResponse'
        '409':
          $ref: '#/components/responses/Conflict'
        default:
          $ref: '#/components/responses/Error'
  /assets/{assetId}/confirm:
    post:
      tags:
      - Assets
      operationId: confirmInsightAsset
      parameters:
      - $ref: '#/components/parameters/AssetId'
      responses:
        '200':
          description: Confirmed asset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetResponse'
        default:
          $ref: '#/components/responses/Error'
  /assets/merge:
    post:
      tags:
      - Assets
      operationId: mergeInsightAssets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
              - sourceAssetIds
              - merged
              properties:
                sourceAssetIds:
                  type: array
                  minItems: 2
                  maxItems: 20
                  items:
                    type: string
                    format: uuid
                merged:
                  type: object
                  additionalProperties: true
      responses:
        '201':
          description: Merged asset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetResponse'
        default:
          $ref: '#/components/responses/Error'
  /topic-sessions:
    post:
      tags:
      - Topics
      operationId: createTopicSession
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TopicSessionCreate'
      responses:
        '202':
          $ref: '#/components/responses/AcceptedJob'
        default:
          $ref: '#/components/responses/Error'
  /topic-sessions/{topicSessionId}:
    get:
      tags:
      - Topics
      operationId: getTopicSession
      parameters:
      - name: topicSessionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Topic session and candidates
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: ../schemas/topic-candidate.schema.json
        default:
          $ref: '#/components/responses/Error'
  /topic-candidates/{topicCandidateId}:
    patch:
      tags:
      - Topics
      operationId: updateTopicCandidate
      parameters:
      - $ref: '#/components/parameters/TopicCandidateId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - version
              - patch
              properties:
                version:
                  type: integer
                patch:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Updated candidate
        default:
          $ref: '#/components/responses/Error'
  /topic-candidates/{topicCandidateId}/feedback:
    post:
      tags:
      - Topics
      operationId: addTopicCandidateFeedback
      parameters:
      - $ref: '#/components/parameters/TopicCandidateId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - reason
              properties:
                reason:
                  enum:
                  - not_my_view
                  - too_generic
                  - already_covered
                  - weak_evidence
                  - wrong_audience
                  - private
                  - other
                note:
                  type: string
                  maxLength: 1000
      responses:
        '204':
          description: Recorded
        default:
          $ref: '#/components/responses/Error'
  /topic-candidates/{topicCandidateId}/select:
    post:
      tags:
      - Topics
      operationId: selectTopicCandidate
      parameters:
      - $ref: '#/components/parameters/TopicCandidateId'
      - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '201':
          description: Content run draft
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentRunResponse'
        default:
          $ref: '#/components/responses/Error'
  /content-runs:
    get:
      tags:
      - Content Runs
      operationId: listContentRuns
      parameters:
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Content runs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentRunListResponse'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags:
      - Content Runs
      operationId: createContentRun
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContentRunCreate'
      responses:
        '201':
          description: Content run draft
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentRunResponse'
        default:
          $ref: '#/components/responses/Error'
  /content-runs/{runId}:
    get:
      tags:
      - Content Runs
      operationId: getContentRun
      parameters:
      - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Content run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentRunResponse'
        default:
          $ref: '#/components/responses/Error'
  /content-runs/{runId}/start:
    post:
      tags:
      - Content Runs
      operationId: startContentRun
      parameters:
      - $ref: '#/components/parameters/RunId'
      - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          $ref: '#/components/responses/AcceptedJob'
        default:
          $ref: '#/components/responses/Error'
  /content-runs/{runId}/cancel:
    post:
      tags:
      - Content Runs
      operationId: cancelContentRun
      parameters:
      - $ref: '#/components/parameters/RunId'
      responses:
        '202':
          $ref: '#/components/responses/AcceptedJob'
        default:
          $ref: '#/components/responses/Error'
  /content-runs/{runId}/retry:
    post:
      tags:
      - Content Runs
      operationId: retryContentRun
      parameters:
      - $ref: '#/components/parameters/RunId'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fromStep:
                  type: string
      responses:
        '202':
          $ref: '#/components/responses/AcceptedJob'
        default:
          $ref: '#/components/responses/Error'
  /content-runs/{runId}/interview:
    get:
      tags:
      - Content Runs
      operationId: getInterview
      parameters:
      - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Interview questions and answers
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/InterviewQuestion'
        default:
          $ref: '#/components/responses/Error'
  /content-runs/{runId}/interview/answers:
    post:
      tags:
      - Content Runs
      operationId: saveInterviewAnswers
      parameters:
      - $ref: '#/components/parameters/RunId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - answers
              properties:
                answers:
                  type: array
                  minItems: 1
                  maxItems: 5
                  items:
                    type: object
                    required:
                    - questionId
                    - text
                    - saveAsAsset
                    properties:
                      questionId:
                        type: string
                        format: uuid
                      text:
                        type: string
                        maxLength: 20000
                      saveAsAsset:
                        type: boolean
      responses:
        '200':
          description: Saved
        default:
          $ref: '#/components/responses/Error'
  /content-runs/{runId}/resume:
    post:
      tags:
      - Content Runs
      operationId: resumeContentRun
      parameters:
      - $ref: '#/components/parameters/RunId'
      - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          $ref: '#/components/responses/AcceptedJob'
        default:
          $ref: '#/components/responses/Error'
  /content-runs/{runId}/brief:
    get:
      tags:
      - Content Runs
      operationId: getContentBrief
      parameters:
      - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Current brief
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: ../schemas/content-brief.schema.json
        default:
          $ref: '#/components/responses/Error'
    patch:
      tags:
      - Content Runs
      operationId: updateContentBrief
      parameters:
      - $ref: '#/components/parameters/RunId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VersionedPatch'
      responses:
        '200':
          description: Updated brief
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: ../schemas/content-brief.schema.json
        '409':
          $ref: '#/components/responses/Conflict'
        default:
          $ref: '#/components/responses/Error'
  /content-runs/{runId}/assets:
    get:
      tags:
      - Content Runs
      operationId: listContentAssets
      parameters:
      - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Content pack assets
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ContentAsset'
        default:
          $ref: '#/components/responses/Error'
  /content-assets/{contentAssetId}:
    get:
      tags:
      - Content Runs
      operationId: getContentAsset
      parameters:
      - $ref: '#/components/parameters/ContentAssetId'
      responses:
        '200':
          description: Content asset
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ContentAsset'
        default:
          $ref: '#/components/responses/Error'
    patch:
      tags:
      - Content Runs
      operationId: updateContentAsset
      parameters:
      - $ref: '#/components/parameters/ContentAssetId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - version
              - body
              properties:
                version:
                  type: integer
                body:
                  type: string
                  maxLength: 100000
                structuredBody:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: New content version
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ContentAsset'
        '409':
          $ref: '#/components/responses/Conflict'
        default:
          $ref: '#/components/responses/Error'
  /content-assets/{contentAssetId}/regenerate:
    post:
      tags:
      - Content Runs
      operationId: regenerateContentAssetSelection
      parameters:
      - $ref: '#/components/parameters/ContentAssetId'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegenerationRequest'
      responses:
        '202':
